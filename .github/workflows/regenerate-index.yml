name: Regenerate Indexes

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Regenerate index files
        run: pnpm --dir scripts run regenerate-indexes

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mods/index.json maps/index.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: regenerate index files"
          git push

      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const prefixes = ['publish/mod/', 'publish/map/', 'update/mod/', 'update/map/'];
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const branch of branches) {
              if (!prefixes.some(p => branch.name.startsWith(p))) continue;
              // Only delete if there's no open PR for this branch
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch.name}`,
                state: 'open'
              });
              if (prs.length === 0) {
                console.log(`Deleting stale branch: ${branch.name}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`
                });
              }
            }
